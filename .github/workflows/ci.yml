name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Lint, format & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rokit toolchain
        uses: CompeyDev/setup-rokit@v0.2.1

      - name: Install tools
        run: rokit install --no-trust-check

      - name: Check formatting (StyLua)
        run: stylua --check .

      - name: Lint (Selene)
        run: selene src tests

      - name: Run headless tests (Lune)
        run: lune run test
