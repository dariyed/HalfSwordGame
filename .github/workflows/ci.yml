name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Lint, format & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rokit toolchain
        uses: CompeyDev/setup-rokit@v0.2.1

      - name: Trust toolchain authors
        run: |
          rokit trust rojo-rbx/rojo
          rokit trust UpliftGames/wally
          rokit trust JohnnyMorganz/StyLua
          rokit trust Kampfkarren/selene
          rokit trust lune-org/lune

      - name: Install tools
        run: rokit install

      - name: Check formatting (StyLua)
        run: stylua --check .

      - name: Lint (Selene)
        run: selene src tests

      - name: Run headless tests (Lune)
        run: lune run test
